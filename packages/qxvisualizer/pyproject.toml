[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "qxvisualizer"
version = "0.0.0.dev0"
requires-python = ">=3.10"
authors = [{ name = "Akinori Machino" }]
description = "Qubex shared visualization tools"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
dependencies = [
    "numpy >= 1.22",
    "plotly >= 5.23",
]

[tool.setuptools.package-data]
qxvisualizer = ["py.typed"]
