[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "qxsimulator"
version = "0.1.0"
requires-python = ">=3.10"
authors = [{ name = "Akinori Machino" }]
description = "Qubex quantum system simulation utilities"
readme = "README.md"
license = { file = "LICENSE" }
dependencies = [
    "jax",
    "networkx ~= 3.0",
    "numpy >= 1.23.5",
    "optax",
    "plotly ~= 5.23",
    "qctrl-visualizer ~= 8.0",
    "qxpulse @ git+https://github.com/amachino/qubex.git@develop-next#subdirectory=packages/qxpulse",
    "qutip ~= 5.0",
    "scipy ~= 1.0",
    "typing_extensions",
]

[tool.setuptools.package-data]
qxsimulator = ["py.typed"]
