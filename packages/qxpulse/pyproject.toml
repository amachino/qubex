[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "qxpulse"
version = "1.5.0a1"
requires-python = ">=3.10"
authors = [{ name = "Akinori Machino" }]
description = "Qubex pulse primitives and scheduling utilities"
readme = "README.md"
license = { file = "LICENSE" }
dependencies = [
    "numpy >= 1.23.5",
    "plotly ~= 5.23",
    "scipy ~= 1.0",
    "typing_extensions",
]

[tool.setuptools.package-data]
qxpulse = ["py.typed"]
