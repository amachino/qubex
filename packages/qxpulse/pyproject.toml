[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "qxpulse"
version = "0.2.0"
requires-python = ">=3.10"
authors = [{ name = "Akinori Machino" }]
description = "Qubex pulse primitives and scheduling utilities"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
dependencies = [
    "numpy >= 1.22",
    "plotly >= 5.23",
    "qxvisualizer",
    "scipy >= 1.0",
    "typing_extensions >= 4.5",
]

[tool.setuptools.package-data]
qxpulse = ["py.typed"]
