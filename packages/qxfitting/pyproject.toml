[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "qxfitting"
version = "0.0.0.dev0"
requires-python = ">=3.10"
authors = [{ name = "Akinori Machino" }]
description = "Qubex fitting and curve-analysis utilities"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
dependencies = [
]

[tool.setuptools.package-data]
qxfitting = ["py.typed"]
