[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "qxcore"
version = "0.1.0"
requires-python = ">=3.10"
authors = [{ name = "Akinori Machino" }]
description = "Qubex core data models and utilities"
readme = "README.md"
license = { file = "LICENSE" }
dependencies = [
    "netCDF4 >= 1.0",
    "numpy >= 1.22",
    "protobuf >= 6.0",
    "pydantic >= 2.0",
    "sympy >= 1.0",
    "typedunits >= 0.0",
    "typing_extensions >= 4.5",
]

[tool.setuptools.package-data]
qxcore = ["py.typed"]
