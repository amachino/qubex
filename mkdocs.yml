site_name: Qubex
site_description: "Qubex: Qubit experiment framework"
repo_url: https://github.com/amachino/qubex
repo_name: amachino/qubex

docs_dir: docs
site_dir: site

theme:
  name: material
  icon:
    logo: material/book 
  font:
    text: Noto Sans
    code: Noto Sans Mono
  palette:
    - scheme: default
      primary: white
  features:
    - navigation.instant
    - content.code.copy

plugins:
  - search
  - mkdocs-autoapi:
      autoapi_dir: src
      autoapi_root: api-reference
      autoapi_add_nav_entry: false
  - mkdocs-jupyter:
      execute: false
      include_source: true
      ignore_h1_titles: true
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            allow_inspection: false
            show_source: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
      - Overview: user-guide/getting-started/index.md
      - Installation: user-guide/getting-started/installation.md
      - Quickstart: user-guide/getting-started/quickstart.md
  - Concepts:
      - Overview: user-guide/concepts/overview.md
      - Terminology: user-guide/concepts/terminology.md
  - How-to Guides:
      - Overview: user-guide/how-to/index.md
      - Basic Measurement: user-guide/how-to/basic-measurement.md
      - Run a Pulse Schedule: user-guide/how-to/run-pulse-schedule.md
      - Save and Load Results: user-guide/how-to/save-and-load-results.md
  - Tutorials:
      - Overview: user-guide/tutorials/index.md
      - 1. Basic Measurement with Experiment: user-guide/tutorials/1_basic-measurement.md
      - 2. Qubit and Resonator Spectroscopy: user-guide/tutorials/2_spectroscopy.md
      - 3. 1Q Calibration: user-guide/tutorials/3_1q-calibration.md
      - 4. 1Q Characterization: user-guide/tutorials/4_1q-characterization.md
      - 5. 1Q Benchmarking: user-guide/tutorials/5_1q-benchmarking.md
      - 6. 2Q Calibration and Benchmarking: user-guide/tutorials/6_2q-calibration-benchmarking.md
  - Reference:
      - Overview: user-guide/reference/index.md
      - Configuration: user-guide/reference/configuration.md
      - Results and Records: user-guide/reference/results-and-records.md
      - State Classification: user-guide/reference/state-classification.md
  - Developer Guide:
      - Overview: developer-guide/index.md
      - Docstring Guidelines: developer-guide/docstring-guidelines.md
      - Test Guidelines: developer-guide/test-guidelines.md
  - Examples: examples/index.md
  - API Reference: api-reference/qubex/
