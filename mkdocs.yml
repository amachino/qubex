site_name: Qubex
site_description: "Qubex: Qubit experiment framework"
repo_url: https://github.com/amachino/qubex
repo_name: amachino/qubex

docs_dir: docs
site_dir: site

theme:
  name: material
  icon:
    logo: material/book 
  font:
    text: Noto Sans
    code: Noto Sans Mono
  palette:
    - scheme: default
      primary: black
  features:
    - navigation.instant
    - navigation.footer
    - content.code.copy

plugins:
  - gh-admonitions
  - mkdocs-autoapi:
      autoapi_dir: src
      autoapi_root: api-reference
      autoapi_add_nav_entry: false
  - mkdocs-jupyter:
      execute: false
      include_source: true
      ignore_h1_titles: true
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            allow_inspection: false
            show_source: false
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting started:
      - Installation: user-guide/getting-started/installation.md
      - Quickstart: user-guide/getting-started/quickstart.md
  - Concepts:
      - Overview: user-guide/concepts/overview.md
      - Terminology: user-guide/concepts/terminology.md
  - How-to guides:
      - Overview: user-guide/how-to/index.md
      - Basic measurement (Measurement API, advanced): user-guide/how-to/basic-measurement.md
      - Build a measurement schedule (Measurement API, advanced): user-guide/how-to/run-pulse-schedule.md
  - Tutorials:
      - Overview: user-guide/tutorials/index.md
      - 1. Basic measurement with Experiment: user-guide/tutorials/1_basic-measurement.md
      - 2. Qubit and resonator spectroscopy: user-guide/tutorials/2_spectroscopy.md
      - 3. 1Q calibration: user-guide/tutorials/3_1q-calibration.md
      - 4. 1Q characterization: user-guide/tutorials/4_1q-characterization.md
      - 5. 1Q benchmarking: user-guide/tutorials/5_1q-benchmarking.md
      - 6. 2Q calibration and benchmarking: user-guide/tutorials/6_2q-calibration-benchmarking.md
  - Reference:
      - Overview: user-guide/reference/index.md
      - Configuration: user-guide/reference/configuration.md
      - Skew adjustment: user-guide/reference/skew-adjustment.md
      - Results and records: user-guide/reference/results-and-records.md
      - State classification: user-guide/reference/state-classification.md
  - Developer guide:
      - Overview: developer-guide/index.md
      - Development flow: developer-guide/development-flow.md
      - Experiment API delegation guidelines: developer-guide/experiment-api-delegation-guidelines.md
      - Document guidelines: developer-guide/document-guidelines.md
      - Docstring guidelines: developer-guide/docstring-guidelines.md
      - Dependency guidelines: developer-guide/dependency-guidelines.md
      - quel_ic_config 0.10 migration plan: developer-guide/quel-ic-config-0-10-migration.md
      - Test guidelines: developer-guide/test-guidelines.md
      - Contrib module guidelines: developer-guide/contrib-guidelines.md
      - Issue guidelines: developer-guide/issue-guidelines.md
      - Pull request guidelines: developer-guide/pull-request-guidelines.md
      - Commit message guidelines: developer-guide/commit-guidelines.md
  - Examples: examples/index.md
  - API reference: api-reference/qubex/
