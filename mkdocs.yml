site_name: Qubex
site_description: "Qubex: Qubit experiment framework"
repo_url: https://github.com/amachino/qubex
repo_name: amachino/qubex

docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - gen-files:
      scripts:
        - tools/mkdocs/gen_ref_pages.py
  - literate-nav:
      nav_file: reference/SUMMARY.md
  - section-index
  - mkdocs-jupyter:
      execute: false
      include_source: true
      ignore_h1_titles: true
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            allow_inspection: false
            show_source: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - API Reference: reference/
