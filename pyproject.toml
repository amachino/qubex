[build-system]
requires = ["setuptools >= 61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "qubex"
dynamic = ["version"]
requires-python = ">=3.10"
authors = [{ name = "Akinori Machino" }]
description = "Qubex: Qubit experiment framework"
readme = "README.md"
license = { file = "LICENSE" }
dependencies = [
    "cma ~= 4.0",
    "cvxopt ~= 1.3",
    "cvxpy ~= 1.6",
    "httpx ~= 0.0",
    "jax ~= 0.0",
    "jsonpickle ~= 3.0",
    "jupyter ~= 1.0",
    "kaleido == 0.2.1",
    "matplotlib ~= 3.0",
    "networkx ~= 3.0",
    "numpy ~= 1.0",
    "optax ~= 0.0",
    "plotly ~= 5.23",
    "protobuf ~= 6.0",
    "pydantic ~= 2.0",
    "pyserial ~= 3.5",
    "pyyaml ~= 6.0",
    "qctrl-visualizer ~= 8.0",
    "qutip ~= 5.0",
    "rich ~= 13.0",
    "scikit-learn ~= 1.0",
    "scipy ~= 1.0",
    "typedunits ~= 0.0",
    "tqdm ~= 4.0",
]

[project.optional-dependencies]
backend = ["qubecalib"]

[dependency-groups]
dev = [
    "pyinstrument",
    "pyright",
    "pytest",
    "pytest-cov",
    "pytest-xdist",
    "ruff",
]

[tool.uv.sources]
qubecalib = { git = "https://github.com/qiqb-osaka/qube-calib.git", rev = "3.1.16beta1" }

[tool.setuptools.dynamic]
version = { attr = "qubex.version.VERSION" }

[tool.setuptools.package-data]
qubex = ["py.typed", "clifford/**/*.json"]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
testpaths = ["tests"]

[tool.pyright]
include = ["src", "tests"]
typeCheckingMode = "basic"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle
    "F",    # Pyflakes
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "SLF",  # flake8-self
    "TID",  # flake8-tidy-imports
    "I",    # isort
    "D",    # pydocstyle
    "D213", # multi-line-summary-second-line
]

ignore = [
    "E501",   # line-too-long
    "E731",   # lambda-assignment
    "E741",   # ambiguous-variable-name
    "SIM102", # collapsible-if
    "SIM108", # if-else-block-instead-of-if-exp
    "D100",   # undocumented-public-module
    "D101",   # undocumented-public-class
    "D102",   # undocumented-public-method
    "D103",   # undocumented-public-function
    "D104",   # undocumented-public-package
    "D105",   # undocumented-magic-method
    "D106",   # undocumented-public-nested-class
    "D107",   # undocumented-init
]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.per-file-ignores]
"*.ipynb" = [
    "F401", # unused-import
]
