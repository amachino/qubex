# Example control frequency configuration file.
#
# Format
# ------
# meta:
#   description: <description>
#   unit: <unit>
# data:
#   <qubit_label>: <frequency>
#
# Fields
# ------
# description : str
#     Human-readable description of this parameter section.
# unit : str
#     Unit string consumed by ConfigLoader (converted to internal units).
# qubit_label : str
#     Qubit label with zero padding determined by n_qubits.
#     Example: n_qubits=64 -> Q00..Q63, n_qubits=144 -> Q000..Q143.
# frequency : float
#     Qubit control frequency.


