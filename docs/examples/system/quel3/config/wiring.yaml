# Example wiring configuration for QuEL-3 examples.
#
# Format
# ------
# <chip_id>:
#   - mux: <mux_index>
#     ctrl: [<port_id>, ...]
#     read_out: <port_id>
#     read_in: <port_id>
#     pump: <port_id>  # optional

64Q:
  - mux: 0
    ctrl: [T1-4, T1-2, T1-11, T1-9]
    read_out: T1-1
    read_in: T1-0
    # pump: T1-3
  - mux: 1
    ctrl: [T1-16, T1-14, T1-17, T1-15]
    read_out: T1-8
    read_in: T1-7
    # pump: T1-10
