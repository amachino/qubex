# Example wiring configuration for QuEL-3 examples.
#
# Format
# ------
# <chip_id>:
#   - mux: <mux_index>
#     ctrl: [<port_id>, ...]
#     read_out: <port_id>
#     read_in: <port_id>
#     pump: <port_id>  # optional

64Q:
  - mux: 0
    ctrl: [QT1-4, QT1-2, QT1-11, QT1-9]
    read_out: QT1-1
    read_in: QT1-0
    # pump: QT1-3
  - mux: 1
    ctrl: [QT1-16, QT1-14, QT1-17, QT1-15]
    read_out: QT1-8
    read_in: QT1-7
    # pump: QT1-10
