# Example capture delay configuration file.
#
# Format
# ------
# meta:
#   description: <description>
# data:
#   <mux_index>: <delay>
#
# Fields
# ------
# description : str
#     Human-readable description of this parameter section.
# mux_index : int
#     MUX index (0-based).
# delay : int
#     Capture delay value for each MUX.
#     Unit is 128 ns per count (e.g., delay=1 means 128 ns).


meta:
  description: Example capture delay settings for 64Q chip

data:
  # MUX (delay count; 1 count = 128 ns)
  0: 8
  1: 8
  2: 8
  3: 9
  4: 9
  5: 9
  6: 9
  7: 8
  8: 9
  9: 8
  10: 9
  11: 9
  12: 9
  13: 9
  14: 9
  15: 9
  16: 9
