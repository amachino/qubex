# Example system configuration for backend selection and runtime settings.
#
# Notes
# -----
# - One system.yaml maps to one chip_id.
# - backend selects the active backend section.

schema_version: 1
chip_id: 64Q
backend: quel3

quel1:
  clock_master: 10.0.0.10

# Optional section reserved for QuEL-3 runtime fields.
# Current runtime endpoint/port/trigger settings use built-in defaults:
# endpoint=`localhost`, port=`50051`, trigger_wait=`1000000`.
# QuEL-3 schedule default sampling period is `0.4 ns` (2.5 GS/s).
quel3: {}
