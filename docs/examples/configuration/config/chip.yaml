# Example chip definition for square-lattice chips.
#
# Format
# ------
# <chip_id>:
#   name: <chip_name>
#   n_qubits: <count>
#   topology:
#     type: <topology_type>
#     mux_size: <count_per_mux>
#
# Fields
# ------
# chip_id : str
#     User-defined chip identifier.
# chip_name : str
#     Descriptive chip name.
# count : int
#     Number of qubits on the chip.
# topology : dict, optional
#     Chip topology metadata.
# topology_type : str
#     Topology type (for example `square_lattice`).
# count_per_mux : int
#     Number of qubits multiplexed per mux.


64Q:
  name: "2023-1st-64Q-No14-run3 chip (1,0)"
  n_qubits: 64
  topology:
    type: square_lattice
    mux_size: 4
