# Example chip definition for square-lattice chips.
#
# Format
# ------
# <chip_id>:
#   name: <chip_name>
#   n_qubits: <count>
#
# Fields
# ------
# chip_id : str
#     User-defined chip identifier.
# chip_name : str
#     Descriptive chip name.
# count : int
#     Number of qubits on the chip.


64Q:
  name: "2023-1st-64Q-No14-run3 chip (1,0)"
  n_qubits: 64
