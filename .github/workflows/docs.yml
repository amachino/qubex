name: Docs (MkDocs)

on:
  push:
    branches:
      - "main"
      - "develop"
    paths:
      - "mkdocs.yml"
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true

      # TODO: Remove once quelware-client ships generated pb.
      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Install dependencies
        run: uv sync --locked --all-groups --extra backend

      # TODO: Remove once quelware-client ships generated pb.
      - name: Generate quelware-core protobufs
        run: make -C packages/quelware-client/quelware-core generate

      - name: Build site
        run: uv run mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
