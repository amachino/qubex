name: Python package

on:
  push:
    branches:
      - "main"
      - "develop"
    tags:
      - "v*.*.*"
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches:
      - "main"
      - "develop"
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

jobs:
  build:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Install the latest version of uv and set the python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      # TODO: Remove once quelware-client ships generated pb.
      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Install dependencies
        run: uv sync --locked --dev --group docs --extra backend

      - name: Check release version drift
        run: uv run python scripts/check_release_version.py

      # TODO: Remove once quelware-client ships generated pb.
      - name: Generate quelware-core protobufs
        run: make -C packages/quelware-client/quelware-core generate

      - name: Type check (pyright)
        run: uv run pyright

      - name: Format check (ruff)
        run: uv run ruff format --check

      - name: Lint (ruff)
        run: uv run ruff check --output-format=github
          
      - name: Test (pytest)
        run: uv run pytest -v --tb=short --durations=10 -n auto
