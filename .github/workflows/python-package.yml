name: Python package

on:
  push:
    branches: ["develop", "release/**"]
  pull_request:
    branches: ["develop", "release/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgirepository1.0-dev libcairo2-dev

      - name: Install dependencies
        run: |
          uv pip install --system ruff pytest pytest-xdist
          uv pip install --system .[backend]

      - name: Lint with ruff
        run: |
          ruff check --output-format=github .

      - name: Test with pytest
        run: |
          pytest -v --tb=short --maxfail=1 --durations=10 -n auto
